{% extends 'layout.html' %}
{% block content %}
  <h1>Novo Serviço para {{ cliente.nome }}</h1>
  <form method="post">
    <label>Descrição (parte do veículo)</label>
    <textarea name="descricao"></textarea>
    <label>Teste de bico injetor</label>
    <input type="checkbox" name="teste_bico" value="1">
    <label>Teste de bomba de alta pressão</label>
    <input type="checkbox" name="teste_bomba" value="1">
    <label>Foi apenas um teste?</label>
    <input type="checkbox" name="apenas_teste" value="1">
    <label>Valor mão de obra</label>
    <input name="mao_de_obra" type="number" step="0.01">

    <h3>Peças utilizadas</h3>
    <div id="pecas-list">
      <div class="peca-item">
        <input name="pecas_nome" placeholder="Nome da peça">
        <input name="pecas_qtde" placeholder="Quantidade" type="number" value="1">
        <input name="pecas_valor" placeholder="Valor unitário" type="number" step="0.01" value="0.0">
      </div>
    </div>
    <button type="button" id="add-peca">Adicionar peça</button>

    <button type="submit">Registrar serviço</button>
  </form>

  <script>
    document.getElementById('add-peca').addEventListener('click', function(){
      const container = document.getElementById('pecas-list');
      const div = document.createElement('div');
      div.className = 'peca-item';
      div.innerHTML = '<input name="pecas_nome" placeholder="Nome da peça"> <input name="pecas_qtde" placeholder="Quantidade" type="number" value="1"> <input name="pecas_valor" placeholder="Valor unitário" type="number" step="0.01" value="0.0">';
      container.appendChild(div);
    });
  </script>

{% endblock %}
