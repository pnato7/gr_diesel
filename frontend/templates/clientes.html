{% extends 'layout.html' %}
{% block content %}
  <h1>Clientes</h1>
  <table class="table">
    <thead><tr><th>ID</th><th>Nome</th><th>Telefone</th><th>Veículo</th><th>Ações</th></tr></thead>
    <tbody>
      {% for c in clientes %}
      <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.nome }}</td>
        <td>{{ c.telefone }}</td>
        <td>{{ c.modelo_veiculo }} - {{ c.placa }}</td>
        <td><a href="/servico/novo/{{ c.id }}">Novo serviço</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
